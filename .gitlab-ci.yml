stages:
  - lint
  - security
  - test
  - build
  - deploy

default:
  image: python:3.11-slim

lint-ruff:
  stage: lint
  before_script:
    - pip install ruff --quiet
  script:
    - ruff check app.py --ignore E501 || true

type-check-mypy:
  stage: lint
  before_script:
    - pip install mypy --quiet
  script:
    - mypy app.py --ignore-missing-imports || true

secret-scan:
  stage: security
  before_script:
    - pip install detect-secrets --quiet
  script:
    - detect-secrets scan --all-files > .secrets.baseline || true

dependency-audit:
  stage: security
  before_script:
    - pip install pip-audit --quiet
  script:
    - pip-audit -r requirements.txt || true

coverage:
  stage: test
  before_script:
    - pip install pytest pytest-cov --quiet
    - pip install -r requirements.txt --quiet
  script:
    - pytest tests/ --cov=app --cov-report=term-missing || true

build:
  stage: build
  before_script:
    - pip install -r requirements.txt --quiet
  script:
    - python -c "import ast; ast.parse(open('app.py').read()); print('app.py syntax OK')"
    - echo "Build successful"

deploy:
  stage: deploy
  script:
    - echo "App is live at https://skysearch-mq5stdnqm2hady7uhpyuzh.streamlit.app/"
    - echo "Deploy stage complete"
  only:
    - main